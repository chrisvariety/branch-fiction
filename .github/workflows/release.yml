name: Release

# Build and publish a desktop release when a version tag is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Produces a *draft* GitHub Release with macOS (Apple Silicon + Intel),
# Windows, and Linux installers attached. Review and publish it manually.
#
# The workflow_dispatch trigger is for test runs; it builds against the
# branch ref and the resulting draft is named after the branch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default to read-only; the publish job opts into write below.
permissions:
  contents: read

# Never run two release builds for the same ref at once, and never cancel an
# in-progress one (a half-built, half-published release is worse than waiting).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: Publish (${{ matrix.target }})
    permissions:
      contents: write # tauri-action creates the GitHub Release and uploads installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: ''
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 25.9.0
          package-manager-cache: false

      # rustup + a default stable toolchain are preinstalled on GitHub-hosted
      # runners, so we only add the extra cross-compile targets (macOS).
      - name: Add Rust targets
        if: matrix.rust-targets != ''
        shell: bash
        env:
          RUST_TARGETS: ${{ matrix.rust-targets }}
        run: rustup target add $RUST_TARGETS

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (ignored on other platforms).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Branch Fiction ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
